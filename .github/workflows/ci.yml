name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Concoction.slnx

      - name: Build
        run: dotnet build Concoction.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Concoction.slnx --no-build --configuration Release --logger "console;verbosity=normal"
