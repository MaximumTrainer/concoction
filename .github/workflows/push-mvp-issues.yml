name: Push MVP Issues on Branch

on:
  push:
    branches:
      - copilot/concoction-feature-roadmap
    paths:
      - .github/issue-manifests/concoction-mvp.json
      - .github/workflows/push-mvp-issues.yml

permissions:
  issues: write
  contents: read

concurrency:
  group: push-mvp-issues-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest exists
        run: |
          if [ ! -f ".github/issue-manifests/concoction-mvp.json" ]; then
            echo "Manifest not found: .github/issue-manifests/concoction-mvp.json"
            exit 1
          fi

      - name: Create or update issues from manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.github/issue-manifests/concoction-mvp.json';
            if (!fs.existsSync(path)) {
              core.setFailed(`Manifest not found: ${path}`);
              return;
            }

            let text;
            try {
              text = fs.readFileSync(path, 'utf8');
            } catch (err) {
              core.setFailed(`Failed to read manifest at ${path}: ${err.message}`);
              return;
            }

            let issues;
            try {
              issues = JSON.parse(text);
            } catch (err) {
              core.setFailed(`Invalid JSON manifest: ${err.message}`);
              return;
            }

            if (!Array.isArray(issues)) {
              core.setFailed('Manifest must be an array of issue objects.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = (await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: 'mvp',
              state: 'all',
              per_page: 100
            })).filter(item => !item.pull_request);

            const existingByTitle = new Map(existing.map(item => [item.title, item]));

            const requiredLabels = new Set(
              issues.flatMap(item => Array.isArray(item.labels) ? item.labels : [])
            );
            const existingLabels = new Set(
              (await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner,
                repo,
                per_page: 100
              })).map(label => label.name.toLowerCase())
            );

            for (const labelName of requiredLabels) {
              if (existingLabels.has(labelName.toLowerCase())) {
                continue;
              }
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: '0366d6'
                });
                existingLabels.add(labelName.toLowerCase());
                core.info(`Created missing label: ${labelName}`);
              } catch (err) {
                if (err.status === 422) {
                  core.info(`Label already exists (race-safe): ${labelName}`);
                  existingLabels.add(labelName.toLowerCase());
                  continue;
                }
                throw err;
              }
            }

            for (const item of issues) {
              if (!item.title || !item.body) {
                core.setFailed(`Each issue must have title and body. Offender: ${JSON.stringify(item)}`);
                return;
              }

              const match = existingByTitle.get(item.title);
              if (match) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: match.number,
                  state: 'open',
                  body: item.body,
                  labels: item.labels || []
                });
                core.info(`Updated issue #${match.number}: ${item.title}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: item.title,
                  body: item.body,
                  labels: item.labels || []
                });
                core.info(`Created issue #${created.data.number}: ${item.title}`);
              }
            }
