name: Push MVP Issues on Branch

on:
  push:
    branches:
      - copilot/concoction-feature-roadmap

permissions:
  issues: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update issues from manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.github/issue-manifests/concoction-mvp.json';
            const text = fs.readFileSync(path, 'utf8');
            let issues;
            try {
              issues = JSON.parse(text);
            } catch (err) {
              core.setFailed(`Invalid JSON manifest: ${err.message}`);
              return;
            }

            if (!Array.isArray(issues)) {
              core.setFailed('Manifest must be an array of issue objects.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            for (const item of issues) {
              if (!item.title || !item.body) {
                core.setFailed(`Each issue must have title and body. Offender: ${JSON.stringify(item)}`);
                return;
              }

              const match = existing.find(e => e.title === item.title);
              if (match) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: match.number,
                  body: item.body,
                  labels: item.labels || []
                });
                core.info(`Updated issue #${match.number}: ${item.title}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: item.title,
                  body: item.body,
                  labels: item.labels || []
                });
                core.info(`Created issue #${created.data.number}: ${item.title}`);
              }
            }
