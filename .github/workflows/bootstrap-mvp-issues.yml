name: Bootstrap MVP Issues

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Path to the JSON issue manifest in the repository
        required: true
        default: .github/issue-manifests/concoction-mvp.json
  push:
    branches:
      - main
    paths:
      - .github/issue-manifests/*.json
      - .github/workflows/bootstrap-mvp-issues.yml

permissions:
  contents: read
  issues: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create or update issues from manifest
        uses: actions/github-script@v7
        env:
          MANIFEST_PATH: ${{ github.event.inputs.manifest_path || '.github/issue-manifests/concoction-mvp.json' }}
        with:
          script: |
            const crypto = require("node:crypto");
            const fs = require("node:fs");
            const path = require("node:path");

            const manifestPath = process.env.MANIFEST_PATH;
            if (!manifestPath) {
              core.setFailed("Internal error: manifest_path was not provided.");
              return;
            }

            const workspace = process.env.GITHUB_WORKSPACE ?? process.cwd();
            const resolvedPath = path.resolve(workspace, manifestPath);

            if (!fs.existsSync(resolvedPath)) {
              core.setFailed(`Manifest file not found: ${manifestPath}`);
              return;
            }

            let manifest;
            try {
              manifest = JSON.parse(fs.readFileSync(resolvedPath, "utf8"));
            } catch (error) {
              core.setFailed(`Failed to parse manifest JSON: ${error.message}`);
              return;
            }

            if (!Array.isArray(manifest)) {
              core.setFailed("Manifest must be a JSON array of issue definitions.");
              return;
            }

            const { owner, repo } = context.repo;
            const labelColorPalette = [
              "0e8a16",
              "1d76db",
              "5319e7",
              "d93f0b",
              "fbca04",
              "b60205",
              "0052cc",
              "006b75"
            ];

            function hashLabelNameToColor(name) {
              const hash = crypto.createHash("sha256").update(name).digest("hex");
              const index = parseInt(hash.slice(0, 8), 16) % labelColorPalette.length;
              return labelColorPalette[index];
            }

            function sanitizeLabels(labels) {
              if (!Array.isArray(labels)) {
                return [];
              }

              return [...new Set(
                labels
                  .filter(label => typeof label === "string")
                  .map(label => label.trim())
                  .filter(label => label.length > 0)
              )];
            }

            function normalizeManifestId(value) {
              return typeof value === "string" ? value.trim() : "";
            }

            function sanitizeTitleAliases(titles) {
              if (!Array.isArray(titles)) {
                return [];
              }

              return [...new Set(
                titles
                  .filter(title => typeof title === "string")
                  .map(title => title.trim())
                  .filter(title => title.length > 0)
              )];
            }

            function manifestIdMarker(manifestId) {
              return `<!-- issue-manifest-id: ${manifestId} -->`;
            }

            function appendManifestIdMarker(body, manifestId) {
              if (!manifestId) {
                return body;
              }

              const marker = manifestIdMarker(manifestId);
              if (body.includes(marker)) {
                return body;
              }

              return `${body.trimEnd()}\n\n${marker}\n`;
            }

            function extractManifestId(body) {
              if (typeof body !== "string") {
                return "";
              }

              const match = body.match(/<!--\s*issue-manifest-id:\s*([^\s>]+)\s*-->/i);
              return match ? match[1].trim() : "";
            }

            async function ensureLabel(labelName) {
              try {
                await github.rest.issues.getLabel({
                  owner,
                  repo,
                  name: labelName
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: hashLabelNameToColor(labelName),
                  description: "Created automatically by the issue bootstrap workflow."
                });
              }
            }

            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100
            });

            const issuesByTitle = new Map();
            const duplicateTitles = new Set();
            const issuesByManifestId = new Map();
            const duplicateManifestIds = new Set();

            for (const issue of existingIssues) {
              const existingManifestId = extractManifestId(issue.body);
              if (existingManifestId) {
                if (issuesByManifestId.has(existingManifestId)) {
                  duplicateManifestIds.add(existingManifestId);
                } else {
                  issuesByManifestId.set(existingManifestId, issue);
                }
              }

              if (issuesByTitle.has(issue.title)) {
                duplicateTitles.add(issue.title);
                continue;
              }

              issuesByTitle.set(issue.title, issue);
            }

            for (const duplicateTitle of duplicateTitles) {
              core.warning(`Multiple existing issues share the title "${duplicateTitle}". The workflow will skip updates for this title.`);
            }

            for (const duplicateManifestId of duplicateManifestIds) {
              core.warning(`Multiple existing issues share the manifest id "${duplicateManifestId}". The workflow will skip updates for this manifest entry.`);
            }

            const seenManifestIds = new Set();
            const claimedIssueNumbers = new Set();
            const supersededLegacyIssueNumbers = new Set();

            for (const [index, item] of manifest.entries()) {
              if (!item || typeof item !== "object") {
                core.warning(`Skipping manifest entry ${index}: expected an object.`);
                continue;
              }

              const manifestId = normalizeManifestId(item.id);
              const title = typeof item.title === "string" ? item.title.trim() : "";
              const rawBody = typeof item.body === "string" ? item.body : "";
              const body = appendManifestIdMarker(rawBody, manifestId);
              const labels = sanitizeLabels(item.labels);
              const replacesTitles = sanitizeTitleAliases(item.replacesTitles);

              if (!title) {
                core.warning(`Skipping manifest entry ${index}: missing title.`);
                continue;
              }

              if (!rawBody.trim()) {
                core.warning(`Skipping manifest entry "${title}": missing body.`);
                continue;
              }

              if (manifestId) {
                if (seenManifestIds.has(manifestId)) {
                  core.warning(`Skipping manifest entry "${title}" because manifest id "${manifestId}" is duplicated in the manifest.`);
                  continue;
                }

                if (duplicateManifestIds.has(manifestId)) {
                  core.warning(`Skipping manifest entry "${title}" because multiple repository issues already use manifest id "${manifestId}".`);
                  continue;
                }

                seenManifestIds.add(manifestId);
              }

              for (const label of labels) {
                await ensureLabel(label);
              }

              if (!manifestId && duplicateTitles.has(title)) {
                core.warning(`Skipping manifest entry "${title}" because multiple repository issues already use this title.`);
                continue;
              }

              let existingIssue = manifestId ? issuesByManifestId.get(manifestId) : undefined;

              if (!existingIssue && !duplicateTitles.has(title)) {
                existingIssue = issuesByTitle.get(title);
              }

              if (!existingIssue) {
                for (const legacyTitle of replacesTitles) {
                  if (duplicateTitles.has(legacyTitle)) {
                    core.warning(`Legacy title "${legacyTitle}" for manifest entry "${title}" matched multiple issues and will be ignored.`);
                    continue;
                  }

                  const legacyIssue = issuesByTitle.get(legacyTitle);
                  if (!legacyIssue || claimedIssueNumbers.has(legacyIssue.number)) {
                    continue;
                  }

                  existingIssue = legacyIssue;
                  break;
                }
              }

              if (existingIssue) {
                claimedIssueNumbers.add(existingIssue.number);

                for (const legacyTitle of replacesTitles) {
                  if (legacyTitle === existingIssue.title || duplicateTitles.has(legacyTitle)) {
                    continue;
                  }

                  const legacyIssue = issuesByTitle.get(legacyTitle);
                  if (legacyIssue) {
                    supersededLegacyIssueNumbers.add(legacyIssue.number);
                  }
                }

                const existingLabels = [...new Set((existingIssue.labels ?? [])
                  .map(label => typeof label === "string" ? label : label?.name)
                  .filter(label => typeof label === "string"))]
                  .sort();
                const desiredLabels = [...labels].sort();
                const titleChanged = existingIssue.title !== title;
                const bodyChanged = existingIssue.body !== body;
                const labelsChanged = existingLabels.length !== desiredLabels.length
                  || existingLabels.some((label, labelIndex) => label !== desiredLabels[labelIndex]);

                if (!titleChanged && !bodyChanged && !labelsChanged) {
                  core.notice(`No changes needed for issue #${existingIssue.number}: ${title}`);
                  continue;
                }

                const updatedIssue = await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existingIssue.number,
                  title,
                  body,
                  labels
                });

                if (manifestId) {
                  issuesByManifestId.set(manifestId, updatedIssue.data);
                }

                core.notice(`Updated issue #${existingIssue.number}: ${title}`);
                continue;
              }

              const createdIssue = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels
              });

              claimedIssueNumbers.add(createdIssue.data.number);
              if (manifestId) {
                issuesByManifestId.set(manifestId, createdIssue.data);
              }
              issuesByTitle.set(title, createdIssue.data);
              core.notice(`Created issue #${createdIssue.data.number}: ${title}`);
            }

            for (const issueNumber of supersededLegacyIssueNumbers) {
              if (claimedIssueNumbers.has(issueNumber)) {
                continue;
              }

              const issue = existingIssues.find(existingIssue => existingIssue.number === issueNumber);
              if (!issue || issue.state === "closed") {
                continue;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed"
              });

              core.notice(`Closed superseded legacy issue #${issue.number}: ${issue.title}`);
            }
