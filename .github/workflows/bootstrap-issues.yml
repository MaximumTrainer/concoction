name: Bootstrap MVP Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print intended changes without creating issues"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      issues_file:
        description: "Path to the issues YAML payload (relative to repo root)"
        required: false
        default: ".github/issues/mvp-issues.yml"

permissions:
  issues: write
  contents: read

concurrency:
  group: bootstrap-issues
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Create MVP GitHub Issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Bootstrap issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          ISSUES_FILE: ${{ github.event.inputs.issues_file }}
        run: |
          python - <<'PYEOF'
          import os
          import json
          import urllib.parse
          import urllib.request
          import urllib.error
          import yaml

          dry_run  = os.environ["DRY_RUN"].lower() == "true"
          repo     = os.environ["REPO"]
          token    = os.environ["GH_TOKEN"]
          filepath = os.environ["ISSUES_FILE"]

          api_base = f"https://api.github.com/repos/{repo}"
          headers  = {
              "Authorization": f"Bearer {token}",
              "Accept":        "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type":  "application/json",
          }

          def gh_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def gh_post(url, payload):
              data = json.dumps(payload).encode()
              req  = urllib.request.Request(url, data=data, headers=headers, method="POST")
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def ensure_label(name, color="0075ca"):
              url = f"{api_base}/labels/{urllib.parse.quote(name, safe='')}"
              try:
                  gh_get(url)
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      if dry_run:
                          print(f"  [dry-run] would create label: {name}")
                          return
                      gh_post(f"{api_base}/labels", {"name": name, "color": color})
                      print(f"  created label: {name}")
                  else:
                      raise

          # ── load payload ──────────────────────────────────────────────────────────
          with open(filepath, "r") as fh:
              data = yaml.safe_load(fh)

          issues = data.get("issues", [])
          print(f"Loaded {len(issues)} issue(s) from {filepath}")

          # ── fetch existing issue titles (all pages) ───────────────────────────────
          existing_titles = set()
          page = 1
          while True:
              items = gh_get(f"{api_base}/issues?state=all&per_page=100&page={page}")
              if not items:
                  break
              for item in items:
                  # /issues returns PRs too — exclude them
                  if "pull_request" not in item:
                      existing_titles.add(item["title"])
              if len(items) < 100:
                  break
              page += 1

          # ── process each issue ────────────────────────────────────────────────────
          created = skipped = 0
          for issue in issues:
              title  = issue["title"]
              body   = issue.get("body", "")
              labels = issue.get("labels", [])

              if title in existing_titles:
                  print(f"skip (exists): {title}")
                  skipped += 1
                  continue

              for label in labels:
                  ensure_label(label)

              if dry_run:
                  print(f"[dry-run] would create: {title}")
                  created += 1
                  existing_titles.add(title)
              else:
                  result = gh_post(f"{api_base}/issues", {"title": title, "body": body, "labels": labels})
                  print(f"created #{result['number']}: {title}")
                  created += 1
                  existing_titles.add(title)

          # ── summary ───────────────────────────────────────────────────────────────
          created_label = "Would create" if dry_run else "Created"
          summary = [
              f"## Issue Bootstrap Summary",
              f"",
              f"| Metric       | Count |",
              f"|--------------|-------|",
              f"| Total        | {len(issues)} |",
              f"| {created_label} | {created} |",
              f"| Skipped      | {skipped} |",
              f"| Dry run      | {dry_run} |",
          ]
          summary_text = "\n".join(summary)
          print(summary_text)

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a") as fh:
                  fh.write(summary_text + "\n")
          PYEOF
